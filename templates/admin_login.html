<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Attendance System</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            background: #7c3aed;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .logo h1 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
        }
        .logo p { color: #64748b; font-size: 13px; margin-top: 4px; }
        label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            margin-bottom: 24px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #7c3aed; }
        button {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #6d28d9; }
        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .back-link a { color: #64748b; text-decoration: none; }
        .back-link a:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="badge">Admin Access</span>
            <h1>Attendance System</h1>
            <p>Restricted to administrator only. Accessing without the admin's permission will be penalized. </p>
        </div>

        <label for="password">Password</label>
        <input type="password" id="password"
            placeholder="Enter admin password"
            onkeydown="if(event.key==='Enter') login()">

        <button onclick="login()">Login</button>

        <div class="error" id="error">Incorrect password. Please try again.</div>

        <div class="back-link">
            <a href="/">← Back to Scanner Login</a>
        </div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const error    = document.getElementById('error');

            if (!password) {
                error.style.display = 'block';
                error.textContent   = 'Please enter a password.';
                return;
            }

            const res  = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                error.style.display = 'block';
                error.textContent   = data.message;
            }
        }
    </script>
</body>
</html>
