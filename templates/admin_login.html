<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Attendance System</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #7c3aed;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 11px;
            border-radius: 99px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge svg {
            flex-shrink: 0;
        }

        .logo h1 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
        }

        .logo p {
            color: #64748b;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.5;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg.lock-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
        }

        input[type="password"],
        input[type="text"]#password {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #7c3aed; }

        input::placeholder { color: #475569; }

        .show-pwd-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .show-pwd-row input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #7c3aed;
            cursor: pointer;
        }

        .show-pwd-row label {
            color: #94a3b8;
            font-size: 12.5px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            margin: 0;
            cursor: pointer;
            user-select: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { background: #6d28d9; }
        button:active { transform: scale(0.99); }

        button .spinner {
            display: none;
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .btn-text { opacity: 0.85; }
        button.loading .spinner { display: inline-block; }

        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 18px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error svg {
            flex-shrink: 0;
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link a:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="badge">
                Admin access
            </span>
            <h1>Attendance system</h1>
            <p>Restricted to administrators only. Accessing without permission will be penalized.</p>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <svg class="lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                <input type="password" id="password"
                    placeholder="Enter admin password"
                    autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') login()">
            </div>
            <div class="show-pwd-row">
                <input type="checkbox" id="showPwd">
                <label for="showPwd">Show password</label>
            </div>
        </div>

        <button onclick="login()" id="loginBtn">
            <span class="btn-text">Login</span>
            <span class="spinner"></span>
        </button>

        <div class="error" id="error">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
            <span id="error-text">Incorrect password. Please try again.</span>
        </div>

        <div class="back-link">
            <a href="/">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to scanner login
            </a>
        </div>
    </div>

    <script>
        const pwdInput = document.getElementById('password');
        const showPwd  = document.getElementById('showPwd');

        showPwd.addEventListener('change', () => {
            pwdInput.type = showPwd.checked ? 'text' : 'password';
        });

        async function login() {
            const password = pwdInput.value;
            const error     = document.getElementById('error');
            const errorText = document.getElementById('error-text');
            const btn       = document.getElementById('loginBtn');

            if (!password) {
                errorText.textContent = 'Please enter a password.';
                error.style.display = 'flex';
                return;
            }

            error.style.display = 'none';
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res  = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorText.textContent = data.message;
                    error.style.display = 'flex';
                }
            } catch (err) {
                errorText.textContent = 'Connection lost. Please try again.';
                error.style.display = 'flex';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
