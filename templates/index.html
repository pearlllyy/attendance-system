<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System — Station Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            min-height: 100dvh;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #64748b;
            font-size: 13px;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            margin-bottom: 24px;
            appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #0ea5e9;
        }

        select option {
            background: #1e293b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #0284c7;
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        .admin-link {
            text-align: center;
            font-size: 13px;
        }
        .admin-link p{ 
            color: #64748b; 
            text-decoration: none; 
            padding-top: 30px;
        }
        .admin-link :hover{ 
            color: #94a3b8; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="badge">Station Setup</span>
            <h1>Attendance System</h1>
            <p>Select this station's assigned course</p>
        </div>

        <label for="station">Assigned Station</label>
        <select id="station">
            <option value="">— Select a station —</option>
        </select>

        <button onclick="loginStation()">Confirm Station</button>

        <a href="/dashboard" class="admin-link"><p>Admin Access →</p></a>

        <div class="error" id="error">Please select a station before continuing.</div>
    </div>

    <script>
        // Load stations from backend
        async function loadStations() {
            const res = await fetch('/api/stations');
            const data = await res.json();
            const select = document.getElementById('station');
            data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(s);
                opt.textContent = `${s.station_name} (${s.college_code})`;
                select.appendChild(opt);
            });
        }

        // Login as a station
        async function loginStation() {
            const select = document.getElementById('station');
            const error = document.getElementById('error');

            if (!select.value) {
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';
            const station = JSON.parse(select.value);

            const res = await fetch('/station/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(station)
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = '/scanner';
            }
        }

        loadStations();
    </script>
</body>
</html>
