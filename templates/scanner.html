<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner — {{ station_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .station-badge {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .header h1 {
            color: #f1f5f9;
            font-size: 20px;
            font-weight: 700;
        }

        .header p {
            color: #64748b;
            font-size: 13px;
            margin-top: 4px;
        }

        /* Scanner Box */
        #reader {
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #334155;
        }

        /* Result Feedback */
        .result-box {
            width: 100%;
            max-width: 380px;
            margin-top: 20px;
            padding: 18px 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-box.success {
            background: #052e16;
            border: 1px solid #16a34a;
            display: block;
        }

        .result-box.error {
            background: #450a0a;
            border: 1px solid #dc2626;
            display: block;
        }

        .result-box .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .result-box .name {
            color: #f1f5f9;
            font-size: 18px;
            font-weight: 700;
        }

        .result-box .detail {
            font-size: 13px;
            margin-top: 4px;
        }

        .result-box.success .detail {
            color: #86efac;
        }

        .result-box.error .detail {
            color: #fca5a5;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-present {
            background: #16a34a;
            color: white;
        }

        .status-late {
            background: #d97706;
            color: white;
        }

        /* Logout */
        .logout {
            margin-top: 32px;
            color: #475569;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        .logout:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="station-badge">{{ station_name }}</span>
        <h1>ID Scanner</h1>
        <p>Hold student ID in front of camera</p>
    </div>

    <div id="reader"></div>

    <div class="result-box" id="result">
        <div class="icon" id="result-icon"></div>
        <div class="name" id="result-name"></div>
        <div class="detail" id="result-detail"></div>
        <div id="result-status"></div>
    </div>

    <span class="logout" onclick="logout()">← Change Station</span>

    <script src="/static/html5-qrcode.min.js"></script>
    <script>
        let isProcessing = false;

        const html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },  // back camera
            { fps: 15, qrbox: 250 },
            async (decodedText) => {
                // Prevent multiple scans firing at once
                if (isProcessing) return;
                isProcessing = true;

                await sendScan(decodedText);

                // Wait 3 seconds before allowing next scan
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        );

        async function sendScan(studentId) {
            try {
                const res = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId })
                });

                const data = await res.json();
                showResult(data);

            } catch (err) {
                showResult({ 
                    success: false, 
                    message: 'Connection lost. Please try again.' 
                });
            }
        }

        function showResult(data) {
            const box    = document.getElementById('result');
            const icon   = document.getElementById('result-icon');
            const name   = document.getElementById('result-name');
            const detail = document.getElementById('result-detail');
            const status = document.getElementById('result-status');

            box.className = 'result-box';

            if (data.success) {
                box.classList.add('success');
                icon.textContent   = '✅';
                name.textContent   = data.student_name;
                detail.textContent = `Scanned at ${data.time}`;
                status.innerHTML   = `<span class="status-badge status-${data.status.toLowerCase()}">${data.status}</span>`;
            } else {
                box.classList.add('error');
                icon.textContent   = '❌';
                name.textContent   = 'Scan Failed';
                detail.textContent = data.message;
                status.innerHTML   = '';
            }
        }

        function logout() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
